name: Source discovery

# Triggered by the admin UI via workflow_dispatch (POST /api/admin/discover
# from the app). Runs Claude + web search to find new event sources, then
# commits the result JSON to public/discover/<requestId>.json so the admin
# UI can poll for it.

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Region id (e.g. 'lbi', 'metrowest', 'outercape')"
        required: true
        type: string
      requestId:
        description: "Caller-generated request id used as the result filename"
        required: true
        type: string

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    # 5 minutes is plenty — discovery typically takes 1-2 min. No Vercel cap.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run discovery
        env:
          REGION: ${{ inputs.region }}
          REQUEST_ID: ${{ inputs.requestId }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/discover.ts

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "public/discover/${{ inputs.requestId }}.json" 2>/dev/null || true
          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "No discovery result file produced — aborting."
            exit 1
          fi
          # Concurrent discovery runs can race on push. Retry with a rebase
          # if the remote has new commits (typically a parallel discover run
          # or another bot commit landing between our checkout and push).
          # Do NOT include "[skip ci]" — Vercel sees that token and SKIPS
          # the deploy, which would mean newly-added routes are never live.
          git commit -m "discover: ${{ inputs.region }} request ${{ inputs.requestId }}"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected — rebasing and retrying..."
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 1))
          done
          echo "Failed to push after 5 attempts"
          exit 1
