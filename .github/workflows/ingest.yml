name: Daily ingest

on:
  schedule:
    # 06:00 ET = 10:00 UTC (EST) / 11:00 UTC (EDT). Runs at 10:00 UTC year-round; expect a 1-hour shift in winter.
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run ingest
        run: npm run ingest
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage all generated outputs + any auto-applied sources.json fixes.
          git add public/events.json public/events.*.json public/regions.json public/source-health.json config/regions/*/sources.json data/geocode-cache.json 2>/dev/null || true
          if [[ -n "$(git diff --cached --name-only)" ]]; then
            # Flag auto-fixes prominently in the commit message.
            if git diff --cached --name-only | grep -q "config/regions/.*/sources.json"; then
              MSG="chore: refresh events + auto-fixed source configs [skip ci]"
            else
              MSG="chore: refresh events.json [skip ci]"
            fi
            git commit -m "$MSG"
            git push
          else
            echo "No changes to commit"
          fi
